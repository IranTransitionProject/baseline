core_thesis: >-
  The question "who is running Iran?" no longer has a single answer. Six power
  nodes operate with overlapping authority, competing legitimacy, and no
  constitutional mechanism to resolve conflicts between them. The absence of
  a unified command is itself the most important structural fact about the
  Islamic Republic at war.
