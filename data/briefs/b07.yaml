preamble: >-
  ---


  *This is a complete rewrite of Brief #7, originally published February 23, 2026.
  The original answered "who is running Iran?" with a single name: Ali Larijani,
  operating as Khamenei's delegate. That answer was confirmed by events — and then
  rendered obsolete nine days later when an Israeli airstrike killed Khamenei,
  Shamkhani, and the top military command simultaneously. The question remains the
  same. The answer has fractured.*


  ---
separator: '---'
sections:
  - title: "The Question That No Longer Has One Answer"
    level: 2
    content: >-
      On February 22, 2026, the New York Times reported that Ali Larijani was
      effectively running Iran. Six senior Iranian officials and three IRGC members
      confirmed it. The authorization chain was clear: Araghchi to Larijani to
      Khamenei. One man governed. The chain terminated in one authority.


      On February 28, an Israeli airstrike killed Khamenei, his wife, his daughter,
      Ali Shamkhani (the Defense Council chief), IRGC commander-in-chief Nasirzadeh,
      and ground forces commander Pakpour. The chain of command did not merely lose
      its top link. It lost its structural logic. Larijani's authority derived
      entirely from Khamenei's delegation. With Khamenei dead, Larijani became a
      man whose power rested on a delegation from no one.


      For nine days, the Islamic Republic operated without a Supreme Leader — the
      office that constitutionally commands all armed forces, appoints the heads
      of the judiciary and state broadcasting, confirms presidential elections, and
      holds veto power over all state policy. An interim trio — Pezeshkian,
      Mohseni-Ejei, and Arafi — was constitutionally empowered to manage the
      transition. But the trio was designed for administrative continuity, not for
      war command.


      On March 8, Fars announced that the Assembly of Experts had elected Mojtaba
      Khamenei as the third Supreme Leader. The IRGC immediately declared "full
      obedience." The question "who is running Iran?" now has an official answer:
      Mojtaba.


      The official answer is wrong. Mojtaba is the titular authority. The actual
      power architecture is a six-node network with no center, no constitutional
      mechanism for resolving conflicts between nodes, and no historical precedent
      for the configuration it has assumed.

  - title: "Node 1: Mojtaba Khamenei — The Throne"
    level: 2
    content: >-
      Mojtaba is 56 years old. He is a hojatoleslam — a mid-ranking cleric, two
      steps below the ayatollah rank the constitution envisions for the Supreme
      Leader. He has never been elected to any office. He has never been appointed
      to any government position. He has never commanded a military unit. He has
      never given a policy speech. He has never been publicly interviewed on
      governance. His political influence was exercised entirely through his
      father's office — managing networks, overseeing an investment empire
      stretching from Tehran to Dubai and Frankfurt, and cultivating IRGC
      relationships.


      He was elected under IRGC coercion. Iran International reported that
      starting March 3, IRGC commanders conducted "repeated contacts and
      psychological and political pressure" on Assembly of Experts members.
      Those who argued against Mojtaba were given "limited time" to speak.
      Discussion was cut off. A vote was held. At least eight members
      boycotted the process. The atmosphere was described as "unnatural" by
      participants. US and Israeli bombs hit the Assembly's Qom office after
      votes were cast but before the count was completed. The second session
      was held near the shrine of Fatima Masumeh — chosen to reduce airstrike
      risk because of the shrine's religious significance.


      This is not a leader who commands by authority. This is a leader who
      exists because the IRGC needed a theological shell for what is
      functionally a military government. Abbas Milani of Stanford described
      the IRGC as "a mafia, like a rich corporate entity" that wants "to keep
      their turf." Mojtaba is the constitutional wrapper around that turf.
      His role is to sign decrees. His power depends entirely on the IRGC's
      willingness to enforce them.


      The IDF immediately threatened to kill him. Trump said he "won't last
      long" without US approval. The IRGC pledged "full obedience and
      self-sacrifice." The man who has never held office is now the supreme
      commander of a military at war, the theological authority of a clerical
      state, and the primary assassination target of two of the world's most
      capable intelligence services.

  - title: "Node 2: Ahmad Vahidi — The Sword"
    level: 2
    content: >-
      Vahidi commands the IRGC. He was appointed deputy commander by Khamenei in
      December 2025 — two months before the war. When Nasirzadeh was killed on
      February 28, Vahidi assumed command. His authorization is constitutionally
      ambiguous: the Supreme Leader appoints the IRGC commander, and the Supreme
      Leader was dead. Vahidi's authority rests on the fact that he was next in
      line and nobody with the power to challenge him has done so.


      His background is specific and relevant. He led the Quds Force from 1988 to
      1997 — the period that built Iran's proxy architecture across Lebanon, Iraq,
      and the Gulf. He served as defense minister from 2009 to 2013. He is wanted
      by Interpol in connection with the 1994 AMIA bombing in Buenos Aires.
      His international isolation means he has nowhere to go if the Islamic Republic
      falls — creating what analysts have called "absolute loyalty through
      shared fate."


      Vahidi is an enforcer, not a strategist. Multiple analysts describe him as
      "manageable" — a tool rather than a threat to whoever holds the throne.
      This is precisely why the IRGC apparatus pushed his appointment: a commander
      who lacks the independent power base to challenge Mojtaba but possesses the
      operational capacity to hold the security architecture together.


      Reuters reported that six Iranian and regional sources confirmed the IRGC
      has taken "a far greater role in the hierarchy since the war began" and is
      "now involved in every major decision." Vahidi is present in every
      high-ranking meeting. The IRGC's overriding objective, per a security
      official close to the Guards, is regime survival — not military victory.


      Vahidi controls the sword. He does not control the purse, the parliament,
      the judiciary, or the diplomatic apparatus. His power is kinetic: missiles,
      Basij, internal security. It is the most consequential power in wartime.
      It is not sufficient to govern.

  - title: "Node 3: Ali Larijani — The Operator"
    level: 2
    content: >-
      Larijani remains Secretary of the Supreme National Security Council. This
      is the position from which he governed Iran for two months before the war.
      The Soufan Center assessed that he "possesses the mandate to shape or
      facilitate any potential future engagement with the US related to
      de-escalation or indirect diplomacy" and "operates within a more unified
      chain of command" than the interim trio.


      But Larijani's structural position has inverted. Before February 28, he was
      Khamenei's delegate — governing with the Supreme Leader's authority behind
      every decision. After February 28, he was an autonomous actor in a contested
      power structure. After March 8, he is subordinate to a Supreme Leader
      installed by the faction Larijani has been fighting since 2011.


      The Larijani-Paydari rivalry is not tactical disagreement. It is the
      central contest of post-Khamenei Iran. The Paydari Front was literally
      founded from a factional split with Larijani. Jalili's faction engineered
      Larijani's disqualification from presidential races in 2021 and 2024.
      Mirbagheri — the eschatological faction's theological center — confirmed
      Mojtaba's election on Fars. The faction that has spent fifteen years trying
      to destroy Larijani's political career has now installed the Supreme Leader.


      Larijani's operational authority — the SNSC apparatus, the back channels
      to Oman, the pragmatist network within the IRGC and technocracy — remains
      intact. But the question is whether that authority can be exercised under
      a Supreme Leader whose backers want Larijani marginalized. The SNSC
      operates at the Supreme Leader's pleasure. Mojtaba can, constitutionally,
      replace Larijani at any time. Whether he has the institutional capacity
      to do so in wartime — when Larijani's operational networks are the only
      functioning governance infrastructure — is a different question.


      The finding: Larijani is the only node with the capacity to negotiate an
      off-ramp. He is also the node most threatened by the succession outcome.
      The regime's best diplomat is operating under a leader installed by the
      faction most hostile to diplomacy.

  - title: "Node 4: Mohammad-Mehdi Mirbagheri — The Kingmaker"
    level: 2
    content: >-
      Mirbagheri does not hold a military command. He does not run a ministry.
      He confirmed Mojtaba's election on Fars, stating that "a firm opinion
      reflecting the majority view has been reached." This is the public act of
      a kingmaker declaring his king.


      This project has tracked Mirbagheri since its founding. The
      Hojjatiyeh-to-Mesbah-Yazdi-to-Mirbagheri theological lineage represents
      a specific eschatological position: cooperation with the United States is
      cooperation with the Dajjal. This is not metaphor within the faction — it
      is operational theology that motivates institutional behavior. The faction
      controls Assembly of Experts seats, a parliamentary bloc through Paydari,
      media infrastructure through MASAF, and has documented overlap with Basij
      networks.


      Before February 28, Mirbagheri's faction was a spoiler — capable of
      blocking deals but not of controlling the state. Brief #4 documented
      this role. After March 8, the spoiler is the succession architect.
      The faction that blocked every deal for nineteen years has now installed
      the Supreme Leader. This is the single largest upgrade in the
      eschatological faction's institutional position since 1989.


      Mirbagheri's power is not kinetic. It is theological and institutional.
      He provides the legitimacy framework that the IRGC cannot generate on
      its own. A military junta without theological sanction is a coup. A
      Supreme Leader installed with the endorsement of the Assembly of Experts'
      most theologically credentialed faction is constitutional succession.
      Mirbagheri's confirmation transforms an IRGC power grab into a religious
      act — and in a theocratic state, that transformation is the difference
      between legitimate authority and naked force.


      The veto power remains. Any diplomatic initiative, any ceasefire
      negotiation, any deal that Larijani might construct must now pass through
      a Supreme Leader whose installation was blessed by the faction
      theologically committed to blocking exactly such outcomes.

  - title: "Node 5: Mohammad Bagher Ghalibaf — The Parliamentary Warlord"
    level: 2
    content: >-
      Ghalibaf is Speaker of Parliament and a former IRGC air force commander
      from the Iran-Iraq War. He has been reported as "fully in charge of the
      war" by Iranian journalist Mehdi Yahyanejad, citing significant chaos in
      the chain of command. On March 7, when Pezeshkian issued an apology to
      Gulf states and announced Iran would stop striking neighbors, Ghalibaf
      publicly reversed the statement — declaring that as long as Gulf nations
      hosted US bases, they would be subjected to strikes.


      This reversal was broadcast on state television. It was the most visible
      expression of the command-delivery gap: two officials with overlapping
      claims to authority issuing contradictory orders on national television,
      in wartime. The external world saw three non-coordinated narrative threads
      — Larijani's pragmatist signaling, Ghalibaf's hardliner posture, and
      independent marja decrees filling the theological vacuum — and correctly
      concluded that Iran's decision-making structure had fragmented.


      Ghalibaf's power derives from Parliament (which controls legislation
      and budgets), his personal IRGC network (cultivated over decades), and
      his alliance with Mojtaba. The Guardian reported close ties between
      Mojtaba and Ghalibaf. In the new power architecture, Ghalibaf provides
      the legislative channel that the IRGC-Mojtaba axis needs to formalize
      wartime authorities and economic measures. He is the political fixer in
      a system that desperately needs political fixing.

  - title: "Node 6: Masoud Pezeshkian — The Shell"
    level: 2
    content: >-
      Pezeshkian remains President of Iran. He remains irrelevant to the
      power architecture. His own assessment — "I'm a doctor, not a
      politician" — is, if anything, more accurate now than when he said it.


      His one significant act — the March 7 apology to Gulf states for
      Iranian strikes on their territory — was reversed within hours by
      Ghalibaf. The apology was broadcast on state television. The retraction
      was broadcast on state television. The sequence provided primary-source
      evidence of the command-delivery gap: the elected president cannot make
      the military obey his statements, the parliament speaker can
      contradict the president publicly and prevail, and the world watches
      the fragmentation in real time.


      Pezeshkian's constitutional powers — appointing ministers, presenting
      legislation, conducting foreign policy — are formally intact. They are
      operationally meaningless when the Supreme Leader commands the military,
      the IRGC controls internal security, and the parliament speaker
      publicly overrides presidential statements. Pezeshkian is the civilian
      face the Islamic Republic presents to the world. The world is no
      longer fooled.

  - title: "The Network Without a Center"
    level: 2
    content: >-
      The six nodes form a network, not a hierarchy. Each controls a different
      domain of power. None can be removed without collapsing a critical function.
      And no constitutional or institutional mechanism exists to resolve conflicts
      between them.


      Mojtaba holds the constitutional title but not independent authority. Vahidi
      holds the military but not the legitimacy. Larijani holds the operational
      networks but not the Supreme Leader's backing. Mirbagheri holds the
      theological mandate but not the institutional machinery. Ghalibaf holds the
      parliament but not the command authority. Pezeshkian holds the presidency
      but not the power.


      The pre-war architecture was simpler and more dangerous in a different way:
      Khamenei held ultimate authority, Larijani operated as delegate, and every
      other node was subordinate to this chain. The chain was slow, theologically
      constrained, and produced the authorization bottleneck Brief #7 v1.0
      documented — but it was a chain. Decisions could be made, even if slowly.


      The post-succession architecture has no chain. It has a network of veto
      points. Mojtaba cannot command Vahidi without Mirbagheri's theological
      sanction. Vahidi cannot negotiate without Larijani's diplomatic apparatus.
      Larijani cannot negotiate without Mojtaba's authorization — which requires
      Mirbagheri's acquiescence. Ghalibaf can contradict Pezeshkian on state
      television and face no consequence. Pezeshkian can apologize to Gulf states
      and be overruled within hours.


      This is the command-delivery gap at the institutional level, not just the
      military level. The A9 hollowness thesis predicted that the IRGC parallel
      society would fragment under stress. The prediction was correct; the
      fragmentation vector was wrong. We predicted bottom-up desertion — the
      dependent periphery abandoning first. What happened was top-down
      splintering — the command level fractured while the street-level coercive
      apparatus remained intact. The regime is too fragmented to negotiate
      coherently and too intact to collapse.

  - title: "What This Means for the War"
    level: 2
    content: >-
      The six-node architecture has three immediate consequences for the
      conflict.


      First, no one can surrender. "Unconditional surrender" requires a
      unified authority capable of committing the state. Mojtaba cannot commit
      the IRGC — the IRGC permitted his installation, not the reverse. Vahidi
      cannot commit the theological establishment. Larijani cannot commit a
      Supreme Leader whose backers oppose his agenda. The US demand for
      unconditional surrender assumes a counterpart who can deliver it. That
      counterpart does not exist.


      Second, no one can negotiate. Negotiation requires a principal who can
      make binding commitments. Brief #7 v1.0 identified the authorization
      bottleneck: Araghchi to Larijani to Khamenei, with each link having
      different incentives. The new architecture is worse: Araghchi to Larijani
      to Mojtaba to Mirbagheri (theological veto) and Vahidi (military veto)
      and Ghalibaf (legislative veto). The number of veto points has tripled.
      The authorization chain that could not say yes when it had three links
      cannot say yes with six.


      Third, the fragmentation is self-reinforcing under bombardment. Every
      day of strikes degrades the institutional capacity that would be needed
      to restore unified command. Communications infrastructure is being
      destroyed. Commanders are being killed — five Quds Force commanders in
      a single Beirut hotel strike. Units are making autonomous firing
      decisions because the command structure cannot reach them. The longer
      the war continues, the more fragmented the command architecture becomes,
      and the more fragmented the architecture, the less capable any node is
      of terminating the war.


      The original Brief #7 concluded: "The man who can say yes is not at
      the table. The man at the table cannot say yes without asking someone
      who has already said no." The updated conclusion is worse: there is no
      man who can say yes. There are six nodes, each holding a piece of a
      power that was designed to be exercised by one person. The one person
      is dead. The pieces do not reassemble.

