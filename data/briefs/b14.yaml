preamble: >-
  ---


  *Nine days into Operation Epic Fury, the most dangerous variable on the board
  is not the one being discussed. It is not Iran's missile inventory, or the
  succession crisis, or the Kurdish front. It is the fact that no party to this
  conflict — not the United States, not Israel, not Iran, not any regional or
  international actor — has articulated a plausible theory of how this war ends.
  The absence of a theory of victory is itself a structural condition that
  predicts the conflict's duration, its escalatory trajectory, and its likely
  termination mode.*


  *This brief maps the theory-of-victory gap across all parties and argues that
  this gap — not any tactical development — is the primary determinant of how
  long the war lasts and how much damage it does.*


  ---
separator: '---'
sections:
  - title: "Part I: The Contradiction at the Center"
    level: 2
    content: >-
      On March 6, Axios reported that Secretary of State Marco Rubio told Arab
      foreign ministers the US goal is "not regime change" — while simultaneously
      making clear Washington wants "different people running the country." The
      same week, Defense Secretary Pete Hegseth told reporters that this is "not a
      so-called regime change war, but the regime sure did change and the world is
      better off for it." White House Press Secretary Karoline Leavitt, asked
      directly whether regime change is a goal, listed four military objectives —
      eliminating ballistic missiles, destroying Iran's navy, disrupting drone
      production, and ending Iran's nuclear pathway — without answering the
      question.


      These are not communications failures. They are the surface expression of a
      structural impossibility: the stated military objectives and the implied
      political objective cannot be reconciled within any coherent theory of
      victory.


      The four military objectives describe capability degradation. If the campaign
      succeeds on all four, the result is an Iran that cannot project missile force,
      cannot operate a navy, cannot produce drones at scale, and cannot enrich
      uranium. This is a weakened Iran, not a transformed Iran. The regime that
      governed before the strikes — minus its military capabilities — still governs.
      Its internal security apparatus, its judiciary, its clerical establishment, its
      economic control structures, its Basij networks are untouched by air strikes.
      Capability degradation produces a defanged regime, not a replaced one.


      But the implied political objective — choosing Iran's next leader, demanding
      "unconditional surrender," insisting that Mojtaba Khamenei is "unacceptable"
      — describes regime change. These two objectives require fundamentally
      different theories of victory. Capability degradation requires sustained
      bombardment until the target set is exhausted. Regime change requires either
      (a) a ground invasion to physically replace the governing structure, which no
      one is proposing, (b) an internal coup by a faction willing to cut a deal,
      which requires an identifiable interlocutor, or (c) a popular revolution
      empowered by the military vacuum, which requires a coherent opposition with
      organizational capacity.


      None of these conditions obtains. The NIC assessment, completed approximately
      one week before the strikes began and reported by the Washington Post on March
      7, concluded that even a large-scale assault would be unlikely to topple the
      regime or lead to the opposition taking control. The regime's survival
      protocols would be followed. The US intelligence community's own collective
      judgment is that the campaign's implied objective — regime change — is not
      achievable by the campaign's stated means — air strikes.


      This is the theory-of-victory gap in its purest form: the gap between what
      the campaign can do (degrade capability) and what the campaign's rhetoric
      promises (new leadership chosen with US approval). No one has explained how
      to get from one to the other. The gap is not being bridged. It is being
      papered over with contradictory messaging that serves a domestic political
      function — appearing decisive without committing to an endgame — while
      leaving the actual war without a termination condition.

  - title: "Part II: The Succession Defiance"
    level: 2
    content: >-
      On March 8, Fars news agency announced that the Assembly of Experts had
      elected Mojtaba Khamenei as the third Supreme Leader of the Islamic Republic
      — the first hereditary succession since the overthrow of the Pahlavi monarchy
      in 1979. The IRGC immediately issued a statement of full obedience. The
      announcement was confirmed by IRIB state television, Tasnim, and ISNA.


      This is the single most important data point for the theory-of-victory
      analysis, because it answers a question the US campaign left open: how would
      the regime respond to the demand for approved leadership? The answer is
      defiance. Iran chose the one successor Trump explicitly rejected.


      Trump told Axios that Mojtaba is "unacceptable" and "a lightweight." He told
      ABC News that whoever is chosen "is not going to last long" without US
      approval. The IDF posted a Farsi-language warning on X that Israel would
      "continue to pursue every successor." The regime's response was to announce
      the succession anyway — under bombardment, with the Assembly meeting near a
      shrine in Qom to reduce airstrike risk, with at least eight members
      boycotting, under documented IRGC coercion.


      The defiance is analytically significant on three dimensions.


      First, it eliminates the negotiating partner. "Unconditional surrender"
      requires someone on the other side to surrender. Mojtaba — a hojatoleslam who
      has never held elected or appointed office, who was installed under IRGC
      coercion, and whose first act as Supreme Leader is to exist in defiance of an
      American demand — is not a plausible surrender counterpart. He cannot
      surrender without negating the basis of his own authority. His legitimacy,
      such as it is, rests entirely on continuity with his father's resistance
      posture and on IRGC backing. A Mojtaba who surrenders is a Mojtaba who has
      no reason to exist as Supreme Leader.


      Second, it confirms the kingmaker thesis. Ayatollah Mohammad-Mehdi Mirbagheri
      — the eschatological faction leader this project has tracked since its founding
      — confirmed the succession on Fars, stating that "a firm opinion reflecting
      the majority view has been reached." The Hojjatiyeh-to-Mesbah-Yazdi-to-
      Mirbagheri theological lineage, which holds that cooperation with the United
      States is cooperation with eschatological evil, is now the faction that
      installed the Supreme Leader. The spoiler (Brief #4) is no longer blocking
      deals from outside the power structure. The spoiler is the power structure.
      This upgrades the eschatological faction's role from veto-capable spoiler to
      succession architect — a ceiling this project identified but underestimated.


      Third, it creates the puppet problem in its most acute form. Mojtaba has no
      independent institutional base, no military experience, no clerical authority
      beyond his lineage, and no public constituency. Brief #8 predicted that the
      next Supreme Leader would be structurally dependent on the IRGC for survival.
      The prediction was correct; the profile was partially off (we modeled Arafi
      as more likely). But the mechanism is confirmed: Mojtaba is a puppet of the
      IRGC and the eschatological faction simultaneously, which means the actual
      power holders — Vahidi at IRGC command, Mirbagheri at the theological
      center, Larijani at the SNSC — operate through a titular leader who cannot
      independently authorize either war or peace.

  - title: "Part III: The Timeline Trap"
    level: 2
    content: >-
      Trump initially told the Daily Mail the campaign would take "four weeks, or
      less." He then told the New York Times it would take four to five weeks. He
      then said "whatever it takes." In his notification to Congress, he wrote that
      "it is not possible at this time to know the full scope and duration of
      military operations that may be necessary."


      This escalating ambiguity is itself a data point. A campaign with a theory
      of victory has a termination condition. The timeline expands when the
      termination condition is not being met. The question is what happens at week
      seven.


      At week seven, several constraints converge simultaneously.


      Interceptor depletion. The Wall Street Journal reported that the US was
      racing to destroy Iran's missile and drone force before running out of
      interceptors. Gulf allies are running low. Trump claimed on Truth Social
      that stockpiles have "never been higher or better" — the day after the
      Journal's report. The production base for Patriot and Tomahawk missiles is
      slow. Every week of continued Iranian retaliation — however degraded —
      consumes interceptors that cannot be replaced at the rate they are being
      used. The 27 waves of True Promise retaliation, though declining in
      effectiveness (missile launches down 86%, drone shots down 73% by Day 5),
      still impose interceptor costs.


      Domestic political erosion. Only 27% of Americans support the operation
      (Reuters/Ipsos). The Senate war powers vote failed 47-53, but the margin is
      narrow. House Minority Leader Jeffries has not committed to blocking funding
      but says the administration has "failed to make its case." Every week without
      a visible termination condition increases domestic political pressure. Trump
      cannot veto his way through a funding fight if Republican defections grow.


      Economic blowback. Brent crude hit $92.69 on March 7, up from roughly $70
      before the strikes. The Strait of Hormuz is operating at approximately two
      tankers per day versus a normal sixty. Trump has pledged Navy escorts and
      war-risk insurance, but every week of disrupted energy flows raises costs
      for the American consumer — the one constituency Trump cannot afford to
      alienate before midterms.


      Regional ally fatigue. Gulf states absorbing Iranian retaliatory strikes are
      asking for more air defense, not more war. Brief #13 documented the
      exhaustion threshold: countries that spent years managing Iran relationships
      have concluded that accommodation failed. But the reciprocal risk is that
      these same countries, absorbing continued strikes with no visible endgame,
      begin demanding a ceasefire rather than continued degradation. The coalition
      of the willing becomes a coalition of the exhausted.


      The timeline trap is this: the campaign is designed for a war that ends in
      weeks, but the theory-of-victory gap ensures it cannot end in weeks. The
      regime will not surrender because it cannot — Mojtaba's authority depends on
      not surrendering. The opposition cannot take over because it lacks
      organizational capacity. The military objectives can be achieved, but
      achieving them does not produce the political outcome the campaign implies.
      So the campaign continues, consuming resources, eroding support, and drifting
      toward a termination mode nobody planned for.

  - title: "Part IV: The Missing Off-Ramp"
    level: 2
    content: >-
      Every war ends. The question is how. And the how depends on whether an
      off-ramp exists — a mechanism by which the parties move from fighting to
      not-fighting. The theory-of-victory gap has destroyed every plausible
      off-ramp.


      The negotiation off-ramp is dead. Trump declared on Truth Social: "There
      will be no deal with Iran except UNCONDITIONAL SURRENDER!" Rubio told Arab
      foreign ministers there is currently no US dialogue with the Iranian regime
      and that any talks would undermine military objectives. On the Iranian side,
      Foreign Minister Araghchi told NBC's Meet the Press on March 8 that Iran
      needs "to continue fighting for the sake of our people" and rejected calls
      for a ceasefire. The MOIS-CIA backchannel, confirmed active in the first
      48 hours after Khamenei's death, died after Trump's public rejection. Both
      sides have now publicly foreclosed negotiation.


      The Pinochet off-ramp is dead. Brief #5 and module A11 described the
      Pinochet model: an authoritarian regime pivots its external patron and
      economic orientation while preserving domestic control. This requires a
      coherent internal faction willing to cut a deal with Washington — a
      Pinochet, a Deng, a pragmatist who can deliver institutional compliance.
      Before February 28, Larijani was that figure. After Mojtaba's installation,
      Larijani is subordinate to a Supreme Leader installed by the eschatological
      faction. Larijani may still operate the SNSC, but his authority to commit
      the regime to a deal is now mediated through a leader whose backers are
      theologically opposed to any such deal. The Pinochet model requires a
      principal who can sign checks. Mojtaba cannot sign checks the IRGC and
      Mirbagheri faction won't honor.


      The mediator off-ramp is dead. Brief #13 documented this comprehensively:
      Iran struck every country that could have served as a mediator. Qatar is
      operationally disrupted. Oman's port at Duqm was hit. France's military
      base was struck. The Arab world's decade of normalization with Tehran was
      destroyed in 72 hours by the 1988 doctrine's indiscriminate execution. The
      one preserved channel — Oman — is operating under a command-delivery gap
      that means Iran cannot guarantee Omani safety even if it wants to.
      Macron called Pezeshkian on March 8, but a phone call is not a mediation
      infrastructure.


      The popular revolution off-ramp is not materializing. The NIC assessment
      concluded the opposition would be unlikely to take control. Nine days in,
      no large-scale protests have occurred. The OSW Centre for Eastern Studies
      assessed that the "formal process of filling vacancies within the Iranian
      security agencies is proceeding smoothly." The January 2026 massacre killed
      the protest movement's capacity for open mobilization — the security
      apparatus that conducted the massacre is the one institution the air
      campaign has not degraded, because internal security forces are dispersed,
      embedded in civilian infrastructure, and not viable air targets. The
      Atlantic Council's assessment is correct: "Neither protests nor airstrikes
      alone are likely to end the regime's grip on power." The combination requires
      either security forces standing aside (as in 1979) or switching sides — and
      nine days of evidence shows neither happening.


      The collapse off-ramp is not occurring. The A9 hollowness thesis predicted
      that the IRGC parallel society's economic-dependency binding agent would
      fail under stress. This is partially confirmed — command splintering, units
      making autonomous firing decisions, the Pezeshkian apology-retraction cycle
      on March 7 — but the fragmentation is top-down (command level), not bottom-up
      (population level). The 2-4 million dependent population of the IRGC parallel
      society has not deserted. The regime is fragmenting at the command level while
      maintaining coercive capacity at the street level. This is the worst possible
      combination for an off-ramp: too fragmented to negotiate coherently, too
      intact to collapse.

  - title: "Part V: Five Termination Modes"
    level: 2
    content: >-
      If no off-ramp is available by design, the war ends by one of five
      undesigned termination modes. Each has different probability, timeline, and
      consequences. None has been articulated as a strategy by any party.


      Mode 1: Declared victory without actual victory. The most politically
      convenient termination for Washington. Trump declares the military objectives
      achieved — missiles destroyed, navy sunk, nuclear pathway disrupted — and
      announces the campaign is over. This is achievable within the four-to-six-week
      window. The problem: it leaves the regime intact, Mojtaba in place, and the
      eschatological faction ascendant. Iran rebuilds with Chinese resupply
      (Observation 022, convergent spoiler). Within 2-5 years, the missile
      inventory is partially reconstituted, and the next crisis begins from a
      worse starting position — because the regime has survived a US-Israeli
      assault and emerged with its narrative of divine resistance validated.
      The 2003 "Mission Accomplished" parallel is exact. [Speculation — Medium
      confidence. Highest probability mode based on domestic political incentives.]


      Mode 2: Escalation to ground operations. If the air campaign does not produce
      regime collapse and domestic politics permit, the campaign escalates to
      include ground elements — the Kurdish front from Iraq, possibly MEK or
      opposition-linked forces, conceivably SOF operations. This is the only mode
      that could physically replace the governing structure. It is also the mode
      that triggers the Iran-is-not-Iraq problem (Brief #3): Iran's 2,500-year
      civilizational identity, territorial integrity, and 85-million population
      make it categorically different from Iraq. A ground invasion would likely
      unify the population — including the protest movement — against the invader.
      The NIC assessment implicitly rules this out by concluding that even a
      large-scale assault would not topple the regime. [Speculation — Low
      probability absent a dramatic provocation such as nuclear breakout.]


      Mode 3: Mutual exhaustion ceasefire. Both sides run out of capacity to
      continue. Iran's missile and drone inventory is depleted; US/Israeli
      interceptor stocks are critically low; Gulf allies demand a halt; domestic
      opposition in the US forces a funding constraint. A ceasefire is reached not
      through negotiation but through mutual inability to sustain operations. This
      produces the worst of all outcomes: a weakened regime that survived, a
      depleted US/Israeli military posture, a devastated Iranian civilian
      population, no political settlement, no reconstruction framework, and the
      eschatological faction's narrative — that resistance to the Dajjal is
      divinely ordained and divinely rewarded — empirically validated. The ceasefire
      paradox (Observation 034) applies: the same structural forces that prevented
      a pre-war deal prevent a mid-war ceasefire. [Speculation — Medium-High
      probability if Mode 1 is not chosen. Timeline: 6-12 weeks.]


      Mode 4: Internal coup. A faction within the Iranian security establishment
      — pragmatist IRGC officers, Larijani's network, or a coalition of
      institutional actors who calculate that continued war is more dangerous than
      a deal — removes Mojtaba and installs a figure capable of negotiating. This
      is the implicit hope of the air campaign: that sufficient pressure produces
      an internal break. But the theory requires identifying who would conduct
      this coup, what their institutional base is, and how they would survive the
      eschatological faction's opposition. Larijani is the obvious candidate, but
      his power is now subordinated to the Mojtaba-IRGC-Mirbagheri axis. A coup
      would require splitting the IRGC — and the IRGC's statement of "full
      obedience" to Mojtaba, issued within hours of the succession announcement,
      suggests the institution is currently unified around the new leader.
      [Speculation — Low-Medium probability. This is the mode Washington hopes
      for but has no mechanism to produce.]



      Mode 5: Escalatory spiral. A single event — a nuclear breakout attempt, a
      mass-casualty strike on a US carrier, an Iranian attack that kills a
      significant number of American service members (currently seven confirmed
      dead), a strike on a nuclear facility that releases radioactive material —
      triggers escalation beyond the current air campaign. This mode is the one
      most likely to produce an endgame, because it forces decisions that the
      current campaign's ambiguity has deferred. It is also the most dangerous,
      because the decisions it forces are made under crisis conditions by
      leadership structures that — on both sides — have demonstrated incoherence
      under pressure. [Speculation — Probability increases with duration. Every
      week without a termination condition increases the likelihood of the
      triggering event.]


      The key finding: the theory-of-victory gap does not produce stalemate. It
      produces drift — drift toward whichever termination mode is triggered first
      by events rather than chosen by strategy. Mode 1 is the rational choice for
      Washington. Mode 3 is the default if Mode 1 is not chosen. Mode 5 is the
      risk that increases with every week of drift. The absence of a theory of
      victory means the war's ending is determined by contingency rather than by
      design — and contingency in a multi-party conflict with nuclear dimensions,
      fragmented command structures, and exhausted interceptor stocks is the
      highest-risk condition possible.

  - title: "Part VI: Policy Incoherence as Independent Variable"
    level: 2
    content: >-
      This project modeled US policy as background context — a set of constraints
      and preferences that shaped the scenario space. That was a modeling error.
      Nine days of evidence demonstrate that the incoherence of US policy is
      itself an independent variable that shapes outcomes as powerfully as any
      Iranian factional dynamic.


      The evidence is specific and documented.


      On the campaign's justification: Rubio said the US acted because Israel was
      going to strike and Iran would retaliate against US forces — essentially
      admitting the US was pulled into war by Israeli action. The White House
      immediately contradicted this, with Trump claiming he forced Israel's hand.
      Leavitt then said the war was based on Trump's "good feeling" that Iran was
      going to strike. Three justifications in 72 hours, each contradicting the
      others.


      On regime change: Trump called on Iranians to "take back your country." He
      told NBC he wanted to "go in and clean out everything." Hegseth said it's not
      a regime-change war. Leavitt would not say whether it is. Rubio told Arab
      foreign ministers it is not — while saying Washington wants different people
      in charge.


      On the successor: Trump said he "has to be involved" in choosing Iran's next
      leader. He said Mojtaba is "unacceptable." Iran chose Mojtaba anyway. Trump
      said the new leader "won't last long." The IDF threatened to kill any
      successor. The practical effect: the US has demanded something it has no
      mechanism to enforce (approving Iran's Supreme Leader) while creating a
      condition where the regime's defiance of that demand reinforces its internal
      legitimacy.


      On the Kurdish front: Trump initially endorsed the Kurdish ground offensive
      from Iraq. Within 72 hours, the endorsement was walked back. Kurdish
      forces that were planning operations based on American support now face
      uncertainty about whether that support will survive the next news cycle.


      On the timeline: four weeks, or less. Four to five weeks. Whatever it takes.
      The notification to Congress says the duration is unknowable.


      This is not normal policy evolution under wartime fog. This is structural
      incoherence — the absence of a decision framework that would produce
      consistent outputs across spokespeople and across time. The incoherence
      has a specific strategic consequence: every actor in the conflict —
      Iran's factions, Gulf states, Israel, the Kurdish front, European allies,
      China, Russia — is making decisions based on which American statement they
      choose to believe. Maximum uncertainty for all actors produces maximum
      hedging by all actors. Nobody is making commitments because nobody knows
      what the US is actually committed to. And maximum hedging by all actors
      is the condition that extends the conflict — because no one will take
      the risk of moving toward termination when they cannot predict whether the
      US will reward or punish that move.


      The theory-of-victory gap and the policy-incoherence variable are mutually
      reinforcing. Incoherence prevents the articulation of a theory of victory.
      The absence of a theory of victory produces incoherent messaging as
      spokespeople improvise answers to questions the strategy has not addressed.
      The loop is self-sustaining. It ends only when an external shock (Mode 5)
      or domestic political pressure (Mode 1) forces a decision that the current
      policy framework has deferred.

  - title: "Part VII: What This Means Now"
    level: 2
    content: >-
      The theory-of-victory gap is the most important variable in the conflict
      not because it is the most dramatic — the succession crisis and the
      military campaign claim that distinction — but because it is the variable
      that determines how every other variable resolves. The succession matters
      only insofar as the successor can or cannot terminate the war. The military
      campaign matters only insofar as its achievements translate into a political
      outcome. The Kurdish front matters only insofar as it creates facts on the
      ground that a settlement must address. All of these sub-variables are
      indeterminate until the theory-of-victory question is answered.


      The analytical community — Brookings, Atlantic Council, New Lines Institute,
      OSW, Chatham House — has converged on the same finding from different
      directions: air strikes alone will not produce regime change, the opposition
      cannot take control, and the prospects for political resolution are minimal.
      The NIC assessment, the US intelligence community's own collective judgment,
      says the same thing. This brief is not offering a novel conclusion. It is
      offering the framework for understanding what that conclusion implies: an
      extended conflict whose termination mode is determined by contingency rather
      than by design, with escalatory risk increasing as a function of duration.


      What to watch:


      Whether Trump chooses Mode 1 (declared victory) within the four-to-six-week
      window. If he does, the immediate crisis ends but the structural problem —
      an eschatological faction controlling the Supreme Leadership, a depleted
      but surviving regime, Chinese resupply on the horizon — reasserts itself
      within years.


      Whether interceptor depletion forces a timeline decision before domestic
      politics does. The material constraint may be more binding than the
      political one. If Gulf allies run critically low on interceptors before
      Trump declares victory, the coalition unravels from the bottom up.


      Whether an internal Iranian faction — most likely Larijani's network —
      makes a move against Mojtaba. Any signal of IRGC fragmentation below the
      public unity statement would indicate Mode 4 is in play. The observable
      indicator: whether Larijani's SNSC apparatus or Pezeshkian's civilian
      government initiates contact with any mediator independently of the Supreme
      Leader's authority.


      Whether the eschatological faction uses the succession to advance a nuclear
      breakout. Mirbagheri's faction has theological justification for nuclear
      weapons as defensive necessity. Iran possesses an estimated 450 kilograms of
      60%-enriched uranium. The NIC assessment reportedly noted that recovering
      this material would likely require boots on the ground — the one thing the
      air campaign is designed to avoid.


      Whether Congress acts. The war powers vote failed, but funding is a
      different question. If the campaign extends beyond six weeks without a
      visible termination condition, the funding fight becomes the termination
      mechanism that the strategy did not provide.


      The deepest question this brief raises is not about Iran. It is about
      whether the absence of a theory of victory — the structural gap between
      what a military campaign can achieve and what its political rhetoric
      promises — is itself a predictive variable for conflict duration and
      termination mode. The answer, based on nine days of evidence, is yes.
      The war ends when something forces a decision. Nothing is currently
      forcing a decision. So the war continues.

