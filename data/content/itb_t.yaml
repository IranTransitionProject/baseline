- id: T10
  title: "T10 Status and Forward Path"
  level: 2
  content: |
    ITB-T v1.0 establishes the analytical object. It does not produce a transition design
    document; that work belongs to a transition itself, not to pre-transition analysis. The
    module's role is to put the indigenous-restoration template on the table as a serious
    analytical option, document its institutional history, identify what survived
    destruction, sketch restoration mechanics, and honestly catalog failure modes.

    Future module versions will likely:
    - Expand T2 with more institutional detail on pre-1979 governance
    - Develop T6 restoration mechanics with comparative case study work
    - Add detailed treatment of T7.1 capture-resistance design
    - Potentially extend scope to include other indigenous templates (the "narrow" v1.0
      scope decision preserved this hook): traditional bazaari networks, pre-revolutionary
      parliamentary practice, regional autonomy traditions. Whether to extend scope or
      create parallel ITB-T-adjacent modules is a future structural decision.

    This module is a working draft per project Invariant I-10. It is the best-available
    position on its subject, not a finished product.
footer: |
  Module ITB-T v1.0 — first integration of the Indigenous Marjaiya Restoration Thesis as
  a transition template, drawn from Mar 16 chat (137ac9d2) analytical mapping. Cross-
  referenced from Obs 062 (Three-Cluster Legitimacy Fragmentation, Session 30). Narrow
  scope (marjaiya only) preserved per Session 31 owner decision; structural extension hook
  for broader indigenous templates retained in T10.

  Module-level epistemic posture: most claims are Inference at Med-High confidence,
  grounded in documented institutional history and well-established theological-political
  scholarship. The restoration-as-template thesis itself is Inference — Med (logically
  derived from documented institutional features; no live transition test case). Specific
