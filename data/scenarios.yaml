version: v2.0
date: '2026-03-04'
source: Migrated from ISA_SCENARIOS.md v1.5 (Session 14 comprehensive reassessment) + Session 20 wartime rebuild (W1-W5 replace S1-S5)
note: Probabilities are subjective assessments. All probability changes are <=6 percentage points per bound. [Speculation -- tagged honestly]
critical_assessment: For the first time, S2 upper bound exceeds all other scenarios combined (50%). Combined S1+S1A+S1B = 18-31%. Deal track is minority probability
  outcome.
scenario_independent_needs:
- Nuclear facility security framework
- Humanitarian response capacity
- Communications restoration plan
- Constitutional process design
- IRGC economic transition blueprint
- Security sector reform framework
- Diaspora coordination mechanism
- International stakeholder engagement strategy
entries:
- id: S1
  title: Negotiated Nuclear Deal + Regime Preservation
  description: US-Iran deal on nuclear track. Sanctions partially relieved. Regime survives with reduced international pressure. Protests suppressed. No transition.
  probability_current: 7-13%
  probability_history:
  - version: v1.0
    range: 15-25%
    rationale: Initial assessment.
  - version: v1.2
    range: 12-20%
    rationale: Geneva Round 2 produced 'guiding principles' -- diplomatically thin, below 'framework agreement.' Simultaneous military escalation inconsistent with
      genuine de-escalation.
  - version: v1.4
    range: 10-17%
    rationale: Trap 12 (two-track incoherence) + Obs 014 (Congressional kill switch) + token enrichment gap.
  - version: v1.5
    range: 7-13%
    rationale: Larijani revelation confirms wrong-interlocutor thesis at deepest level. Enrichment contradiction cluster. Congressional kill switch + token enrichment
      gap widening.
  key_variables:
  - Ghanbari financial incentive offer (A2.6)
  - Trump transactional orientation
  - two-week draft exchange window
  planning_implication: Transition planning becomes long-term contingency. Diaspora engagement shifts to sustained advocacy and preparation.
  cross_refs:
  - S1A
  - S1B
  - Obs 010
  - Obs 014
  - Trap 12
  parent_scenario: null
  status: CLOSED/SUPERSEDED -- pre-war scenario matrix v1.5. Replaced by wartime W1-W5 in v2.0 (Session 20).
- id: S1A
  title: Nuclear Deal + Genuine Regime Moderation
  description: Deal leads to actual reform pathway. Sanctions relief empowers moderates. Gradual opening.
  probability_current: 3-6%
  probability_history:
  - version: v2.0
    range: 5-10%
    rationale: Initial assessment.
  - version: v1.5
    range: 3-6%
    rationale: Pezeshkian irrelevant -- refers all decisions to Larijani. Larijani ran January massacre. No credible moderation pathway through current institutional
      configuration.
  key_variables:
  - Existence of genuine moderate faction with independent power base
  planning_implication: Most optimistic sub-scenario. Support moderate faction through engagement.
  parent_scenario: S1
  status: CLOSED/SUPERSEDED -- pre-war scenario matrix v1.5. Replaced by wartime W1-W5 in v2.0 (Session 20).
- id: S1B
  title: Nuclear Deal + Alignment Switch (Pinochet Variant)
  description: Deal provides economic oxygen and diplomatic cover. Regime uses relief to crush internal opposition. Eschatological faction may capture succession.
    Democracy foreclosed for a generation.
  probability_current: 8-12%
  probability_history:
  - version: v2.0
    range: 10-15%
    rationale: Initial assessment.
  - version: v1.5
    range: 8-12%
    rationale: 'Even hollow deal now less likely given enrichment gap too wide. Under strike scenario, Pinochet pathway time-shifts: strike -> regime survives but
      damaged -> limited deal to prevent collapse -> IRGC enrichment.'
  key_variables:
  - Deal lacks human rights conditionality
  - Khamenei succession favors hardliner
  - International community prioritizes nuclear compliance over internal governance
  planning_implication: 'This is the scenario transition planners must actively prevent. Deal design is the intervention point -- conditionality, snap-back, maintained
    civil society channels. The economic mechanism is documented: hollow deal routes sanctions relief through IRGC-controlled channels (51% statutory oil revenue).
    See ITB-F12 for conditionality architecture.'
  traps_activated:
  - Trap 1
  - Trap 8
  - Trap 10
  cross_refs:
  - Obs 012
  - ITB-A11
  - ITB-F12
  parent_scenario: S1
  status: CLOSED/SUPERSEDED -- pre-war scenario matrix v1.5. Replaced by wartime W1-W5 in v2.0 (Session 20).
- id: S2
  title: Military Confrontation (Second Strike)
  description: Talks fail. US strikes Iran again (broader than Midnight Hammer). Regime damaged but possibly not destroyed. Chaos, humanitarian crisis.
  probability_current: 35-50%
  probability_history:
  - version: v1.0
    range: 22-33%
    rationale: Initial assessment.
  - version: v1.2
    range: 28-38%
    rationale: Largest US air deployment since 2003 confirmed. Ford CSG arriving ~end Feb. 250+ cargo flights.
  - version: v1.4
    range: 30-42%
    rationale: Graham 'decision already made' claim contradicted by Axios, but military buildup continues independently. Congressional kill switch makes deal failure
      more likely.
  - version: v1.5
    range: 35-50%
    rationale: CRITICAL THRESHOLD CROSSED -- S2 upper bound exceeds all other scenarios combined. Trump 10-15 day deadline (~March 1-6). 90% kinetic action estimate.
      Pentagon presented options including targeting Khamenei/Mojtaba. IRGC-Hezbollah operational takeover. Multi-front regionalization.
  key_variables:
  - Netanyahu pressure
  - Trump deadline (stated ~10-15 days from Feb 19)
  - Iranian provocation risk
  - 40-day mourning cycle (regime provocation during mourning -> US pretext)
  - Hormuz exercise complicates strike planning but also provides escalation ladder
  planning_implication: Immediate humanitarian response. Nuclear facility security urgent. Transition planning must account for destroyed infrastructure and enraged
    population. Hormuz disruption planning must be included -- oil price spike and shipping disruption near-certain.
  traps_activated:
  - Trap 2
  - Trap 6
  - Trap 7
  cross_refs:
  - Obs 014
  - Obs 016
  - Obs 018
  parent_scenario: null
  status: CLOSED/SUPERSEDED -- pre-war scenario matrix v1.5. Replaced by wartime W1-W5 in v2.0 (Session 20).
- id: S3
  title: Regime Collapse (Internal)
  description: Regime loses coherence -- Khamenei death/incapacitation, IRGC split, or economic collapse triggers institutional failure. No external military trigger.
  probability_current: 16-26%
  probability_history:
  - version: v1.0
    range: 10-20%
    rationale: Initial assessment.
  - version: v1.2
    range: 12-22%
    rationale: 40-day mourning cycle active. Security forces fired on mourners. Mourning spread beyond cemeteries.
  - version: v1.4
    range: 14-24%
    rationale: University protests demonstrate secular-opportunistic escalation mechanism. Population will use ANY opening.
  - version: v1.5
    range: 16-26%
    rationale: Day 2 protests across 7+ universities, 2 cities. Students trampled Khamenei image. Larijani four-layer succession planning signals regime itself expects
      instability.
  key_variables:
  - Khamenei health
  - IRGC cohesion
  - Economic trajectory
  - Mourning cycle escalation pattern
  - University/secular-opportunistic escalation mechanism
  planning_implication: This is the scenario where transition planning matters most. Speed of response determines whether outcome is managed transition or chaotic
    collapse.
  traps_activated:
  - Trap 1
  - Trap 3
  - Trap 4
  - Trap 5
  - Trap 6
  cross_refs:
  - Obs 011
  - Obs 020
  parent_scenario: null
  status: CLOSED/SUPERSEDED -- pre-war scenario matrix v1.5. Replaced by wartime W1-W5 in v2.0 (Session 20).
- id: S4
  title: Prolonged Decay
  description: Neither deal nor strike nor collapse. Regime limps on with diminished legitimacy, ongoing low-level unrest, economic deterioration, brain drain acceleration.
    Slow-motion erosion over years.
  probability_current: 12-18%
  probability_history:
  - version: v1.0
    range: 25-35%
    rationale: Initial assessment.
  - version: v1.2
    range: 22-30%
    rationale: Compressed by acceleration in S2 and S3. Current trajectory inherently unstable.
  - version: v1.4
    range: 18-26%
    rationale: Most compressed scenario. Nothing is plateauing.
  - version: v1.5
    range: 12-18%
    rationale: 'Multiple simultaneous acceleration vectors: Trump deadline, university protests, IRGC-Hezbollah reactivation, missile deployments, succession planning,
      enrichment gap. Decay requires plateau. Current dynamics are the opposite.'
  key_variables:
  - Regime's residual repressive capacity
  - International attention span
  planning_implication: Transition planning shifts to long-term institutional capacity building. Diaspora coordination mechanisms matter more than rapid response.
  parent_scenario: null
  status: CLOSED/SUPERSEDED -- pre-war scenario matrix v1.5. Replaced by wartime W1-W5 in v2.0 (Session 20).
- id: S5
  title: Managed Transition (Negotiated)
  description: Internal regime faction negotiates handover of power -- possibly triggered by Khamenei succession. IRGC pragmatists cut deal to preserve economic interests
    in exchange for political transition.
  probability_current: 5-10%
  probability_history:
  - version: v2.0
    range: 5-10%
    rationale: Initial assessment. Larijani's rise neither confirms nor eliminates pragmatist willingness. His documented opposition to Paydari since 2011 means institutional
      pragmatists and eschatological faction are distinct poles. Requires conditions not currently present.
  key_variables:
  - Existence of pragmatist faction within IRGC willing to trade political power for economic preservation
  - IRGC divestiture from NIOC -> Western oil majors enter South Pars -> $35-50B investment -> income in normalized economy exceeds monopoly rents by order of magnitude
  - Personal security guarantees in post-transition environment
  - Chinese counterfactual understanding
  planning_implication: Best-case scenario for institutional continuity. Requires most sophisticated negotiating framework and most detailed transition architecture.
    The wrong interlocutor problem (Obs 010) remains -- this calculation is available to pragmatists only; eschatological faction will reject on theological grounds.
  traps_activated:
  - Trap 1
  - Trap 5
  cross_refs:
  - Obs 010
  - Obs 021
  - ITB-F12
  - ISA-TRAPS Trap 1
  parent_scenario: null
  status: CLOSED/SUPERSEDED -- pre-war scenario matrix v1.5. Replaced by wartime W1-W5 in v2.0 (Session 20).
- id: W1
  title: Campaign Achieves Objectives -- Regime Fracture -- Contested Transition
  description: US/Israeli strikes degrade IRGC capacity below control threshold. Basij destruction removes domestic coercion. Mojtaba cannot consolidate. Population
    moves -- organized uprising or localized collapse of regime authority. Transition becomes contested, multi-actor process.
  probability_current: 20-30%
  probability_history:
  - version: v2.0
    range: 20-30%
    rationale: Initial wartime assessment. Day 5 data. [Speculation]
  key_variables:
  - Degree of Basij/internal security degradation
  - IRGC unit-level cohesion
  - Population interpretation (1979 vs. 2003 Iraq parallel)
  - Diaspora coordination under blackout
  - Armed ethnic/regional groups opening secondary fronts
  planning_implication: Scenario where ITB entire transition planning architecture is most relevant. All traps activate. Speed of transition framework deployment
    determines managed vs. chaotic outcome. Communications restoration mission-critical within hours.
  traps_activated:
  - Trap 1
  - Trap 2
  - Trap 3
  - Trap 4
  - Trap 5
  - Trap 6
  - Trap 7
  - Trap 8
  cross_refs:
  - Romania 1989 + Iraq 2003 hybrid parallel
  parent_scenario: null
  status: ACTIVE
- id: W2
  title: Campaign Stalls -- Ceasefire -- Damaged Regime Survives Under Mojtaba
  description: International pressure, military constraints, or Iranian deterrence success forces ceasefire before regime collapses. Mojtaba consolidates under post-war
    nationalist legitimacy. North Korea-ization pathway.
  probability_current: 25-35%
  probability_history:
  - version: v2.0
    range: 25-35%
    rationale: Initial wartime assessment. Most dangerous scenario for Iranian people. [Speculation]
  key_variables:
  - Hormuz closure duration and sustainability
  - Gulf state pressure on US to halt
  - US Congressional war powers debate
  - Oil price trajectory (>$100 = recession pressure)
  - Iranian civilian casualty trajectory
  - Chinese/Russian diplomatic intervention
  planning_implication: Most dangerous scenario for Iranian people. Damaged regime that survives under wartime legitimacy becomes more repressive, isolated, theologically
    radical. Pinochet mechanism (A11) reactivates in worst form.
  traps_activated:
  - Trap 6 (reverse -- re-cements parallel society)
  - Trap 8 (shape-shifted Pinochet)
  cross_refs:
  - Saddam post-1991 Gulf War parallel
  - A11
  parent_scenario: null
  status: ACTIVE
- id: W3
  title: Negotiated Halt -- Conditional Ceasefire -- Transition Negotiation
  description: Trump "they want to talk" signal is genuine. Mojtaba or pragmatist faction decides survival requires negotiation. Conditional ceasefire likely brokered
    by China. Terms involve nuclear dismantlement, political opening, sanctions relief. Transition negotiation under external pressure with regime participation.
  probability_current: 10-18%
  probability_history:
  - version: v2.0
    range: 10-18%
    rationale: Initial wartime assessment. Best realistic outcome for managed transition. [Speculation]
  key_variables:
  - Mojtaba decision fork (survival-via-negotiation vs. fight-to-end)
  - Whether credible interlocutor exists post-decapitation
  - Chinese willingness to broker
  - Trump willingness to accept less than regime change
  - IRGC command coherence for ceasefire implementation
  planning_implication: 'Best realistic outcome. Requires: deal design avoiding hollow-deal traps (F12); credible interlocutor identification; verification mechanisms
    accounting for wartime destruction; IRGC economic transition path.'
  traps_activated:
  - Trap 1
  - Trap 10 (maximum risk)
  cross_refs:
  - Japan 1945 parallel (but Japan had Emperor who could command compliance)
  - Obs 023
  - Obs 026
  parent_scenario: null
  status: ACTIVE
- id: W4
  title: Escalation Spiral -- Regional War -- Uncontrolled
  description: 'Tit-for-tat escalation exceeds containment. Possible triggers: extended Hormuz closure, full Lebanon war, catastrophic mass casualty event, nuclear
    contamination, state actor drawn in (Turkey, Pakistan).'
  probability_current: 15-22%
  probability_history:
  - version: v2.0
    range: 15-22%
    rationale: Initial wartime assessment. Can emerge from any other scenario. [Speculation]
  key_variables:
  - Hormuz closure duration
  - Hezbollah escalation trajectory
  - Iraqi militia effectiveness
  - Nuclear contamination risk
  - Pakistan stability (22+ killed Karachi protests)
  - Turkish border buildup
  planning_implication: Worst-case. Humanitarian catastrophe at regional scale. Oil above $100, potential global recession. All transition planning suspended -- pure
    crisis management. Diaspora shifts to humanitarian coordination.
  traps_activated:
  - Beyond trap framework -- system-level failure
  cross_refs:
  - WWI escalation dynamic parallel
  parent_scenario: null
  status: ACTIVE
- id: W5
  title: Internal Coup -- Military Junta -- Managed Authoritarianism
  description: Under sustained strike pressure, IRGC commanders overthrow remaining civilian government, declare martial law, pursue capitulation or total war as
    unified military command. Civilian government irrelevant.
  probability_current: 8-15%
  probability_history:
  - version: v2.0
    range: 8-15%
    rationale: Initial wartime assessment. Paradoxically easier to negotiate with but harder to trust. [Speculation]
  key_variables:
  - IRGC internal factional dynamics under fire
  - Whether Mojtaba can command loyalty or becomes figurehead
  - Whether junta more or less willing to negotiate
  - National Interest reporting of IRGC junta pre-strike (unconfirmed)
  planning_implication: IRGC junta paradoxically easier to negotiate with (calculable interests without theological veto) but harder to trust (no institutional legitimacy).
    Security sector reform becomes reforming the government, not a subordinate institution.
  traps_activated:
  - Trap 2 (new form)
  - Trap 1
  cross_refs:
  - Egypt post-Mubarak parallel
  - Pakistan military-civilian cycles
  parent_scenario: null
  status: ACTIVE
